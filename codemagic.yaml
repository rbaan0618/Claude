workflows:
  ios-softphone:
    name: MyLine iOS Softphone
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Softpone_IOS
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mylinetelecom.softphone
      vars:
        XCODE_SCHEME: MyLineSoftphone
        XCODE_PROJECT: softphone-ios/MyLineSoftphone.xcodeproj
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: cd softphone-ios && xcodegen generate
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build and archive
        script: |
          mkdir -p /tmp/xcodebuild_logs
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/MyLineSoftphone.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=5PWNU336CJ \
            archive 2>&1 | tee /tmp/xcodebuild_logs/archive.log; exit ${PIPESTATUS[0]}
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  ios-app-preview:
    name: MyLine iOS App Preview (Simulator)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_SCHEME: MyLineSoftphone
        XCODE_PROJECT: softphone-ios/MyLineSoftphone.xcodeproj
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: cd softphone-ios && xcodegen generate
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
      - name: Build for simulator
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build/simulator \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
    artifacts:
      - build/simulator/Build/Products/Debug-iphonesimulator/*.app

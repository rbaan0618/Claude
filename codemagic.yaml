workflows:
  ios-softphone:
    name: MyLine iOS Softphone
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store        # change to "ad_hoc" for direct device install
        bundle_identifier: com.mylinetelecom.softphone
      vars:
        XCODE_SCHEME: MyLineSoftphone
        XCODE_PROJECT: softphone-ios/MyLineSoftphone.xcodeproj
      xcode: latest
      cocoapods: none

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: cd softphone-ios && xcodegen generate

      - name: Resolve Swift packages
        script: |
          cd softphone-ios
          xcodebuild -resolvePackageDependencies \
            -project MyLineSoftphone.xcodeproj \
            -scheme "$XCODE_SCHEME"

      - name: Build & archive
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration           # set up in Codemagic dashboard
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

# =====================================================================
# nginx location block for the WhatsApp Cloud API webhook
# =====================================================================
# Add this INSIDE the existing HTTPS (port 443) server { } block in:
#     /etc/nginx/sites-available/fusionpbx
#
# Without it, requests to https://<host>/app/whatsapp/webhook.php hit
# nginx's default rewrite rules (FusionPBX index.php) and Meta's webhook
# verification fails with a wrong response body.
#
# After adding, validate and reload:
#     nginx -t && systemctl reload nginx
#
# Test webhook reachability:
#     curl -v "https://<your-fusionpbx-host>/app/whatsapp/webhook.php?hub_mode=subscribe&hub_verify_token=<TOKEN>&hub_challenge=test123"
# Expect: 200 OK, body = test123
#
# Place this block somewhere AFTER the `server_name` directive but BEFORE
# the FusionPBX rewrite rules and the catch-all `location /` block —
# nginx evaluates location matches by specificity, but having the WhatsApp
# block early makes intent obvious.
# =====================================================================

#whatsapp webhook
location /app/whatsapp/ {
    alias /var/www/fusionpbx/app/whatsapp/;
    index webhook.php;
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }
}
